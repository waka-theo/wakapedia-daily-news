---
recherche_actualite_tech_du_jour:
  description: |
    Rechercher et identifier l'actualité technologique la plus importante et pertinente
    PUBLIÉE AUJOURD'HUI (date actuelle) dans les domaines de l'intelligence artificielle,
    du développement informatique, et de l'édition de logiciels SaaS.

    IMPORTANT:
    - Chercher des actualités datées du jour actuel uniquement
    - Utiliser la date du jour dans vos recherches (ex: "actualité IA janvier 2026")
    - Éviter les articles génériques ou intemporels
    - Privilégier les annonces, lancements, levées de fonds, ou découvertes récentes
    - RÉDIGER ENTIÈREMENT EN FRANÇAIS

    CRITÈRES DE QUALITÉ OBLIGATOIRES:
    - Source fiable et reconnue: TechCrunch, The Verge, Wired, Ars Technica, VentureBeat,
      MIT Technology Review, LeMagIT, 01net, Le Monde Informatique, ZDNet, Reuters Tech
    - Article avec des FAITS CONCRETS (chiffres, noms, dates) - PAS de rumeurs ou spéculations
    - Impact réel sur l'industrie tech (pas de gadgets ou accessoires grand public)
    - Éviter les articles sponsorisés, publicitaires ou les communiqués de presse non vérifiés
    - Préférer les annonces officielles et les analyses de sources de référence

    PROCÉDURE ANTI-DOUBLON OBLIGATOIRE:
    0. TOUJOURS commencer par utiliser 'list_used_news_urls' pour voir les 20 derniers
       sujets couverts. Identifier les THÈMES récurrents listés en bas et les ÉVITER.
       Si un thème apparaît 2+ fois, il est INTERDIT de le couvrir à nouveau.
       Chercher dans un domaine DIFFÉRENT (cybersécurité, open source, DevOps, quantique, etc.)
    1. Quand vous trouvez un article intéressant, utilisez d'abord 'check_news_title'
       avec le titre pour vérifier que le THÈME n'a pas déjà été couvert
    2. Si le thème existe déjà, cherchez un article sur un SUJET DIFFÉRENT et répétez l'étape 1
    3. Ensuite utilisez 'check_news_url' avec l'URL pour vérifier qu'elle n'a pas été publiée
    4. Si l'URL existe déjà, cherchez un autre article et répétez l'étape 1
    5. Une fois l'article final validé (thème ET URL nouveaux), utilisez l'outil
       'save_news_url' avec l'URL ET le titre pour l'enregistrer en mémoire
  expected_output: |
    Un paragraphe concis (3-4 phrases) EN FRANÇAIS présentant l'actualité du jour avec:
    - Un TITRE COURT (max 50 caractères) accrocheur et informatif qui résume l'essentiel de la news
      (PAS le début de l'article tronqué, mais un vrai titre rédigé)
    - Une explication claire de pourquoi c'est important
    - Un lien vers la source
    Le contenu DOIT être en français, même si la source est en anglais.
    L'URL DOIT avoir été vérifiée et sauvegardée via les outils de mémoire.
  agent: tech_news_researcher
decouverte_outil_du_jour:
  description: |
    Découvrir et présenter un nouvel outil technologique intéressant et PEU CONNU
    pour l'équipe de développement.

    IMPORTANT:
    - ÉVITER les outils très populaires (GitHub, VS Code, Docker, Notion, Slack, Figma, Jira, etc.)
    - Chercher des outils lancés récemment ou des pépites méconnues
    - L'outil peut être un framework, une bibliothèque, un service SaaS, ou une innovation récente
    - Varier les catégories (un jour un outil IA, le lendemain un outil DevOps, etc.)
    - RÉDIGER ENTIÈREMENT EN FRANÇAIS

    SOURCES À PRIVILÉGIER:
    - Product Hunt (nouveautés récentes, tri par date)
    - GitHub Trending (projets émergents avec étoiles récentes)
    - Hacker News "Show HN" (projets indie et innovations)
    - AlternativeTo (alternatives méconnues à des outils populaires)
    - DevHunt, BetaList (outils en beta ou récemment lancés)

    CRITÈRES DE SÉLECTION:
    - Outil avec au moins 100 stars GitHub OU avis positifs sur Product Hunt
    - Documentation disponible et claire
    - Cas d'usage concret pour une équipe de développement
    - Éviter les outils abandonnés (vérifier la date du dernier commit/mise à jour)

    RÈGLE URL OBLIGATOIRE:
    - L'URL sauvegardée DOIT être la page OFFICIELLE de l'outil :
      page d'accueil du produit, repo GitHub, fiche Product Hunt, ou page BetaList.
    - NE JAMAIS sauvegarder une URL d'article de blog, de liste d'outils, de rapport de tendances,
      ou d'URL contenant /blog/, /tendances/, /top-, /meilleurs, /best-, /outils-, /awesome-.
    - Un outil = une URL unique pointant vers CE seul outil, pas une collection.

    PROCÉDURE ANTI-DOUBLON OBLIGATOIRE:
    1. TOUJOURS commencer par utiliser 'list_used_tools_urls' pour voir les outils récents
    2. Quand vous trouvez un outil intéressant, utilisez l'outil 'check_tool_url'
       avec l'URL officielle pour vérifier qu'il n'a pas déjà été présenté
    3. Si l'URL ou le domaine existe déjà, cherchez un autre outil et répétez l'étape 2
    4. Une fois l'outil final validé (URL non utilisée), utilisez l'outil
       'save_tool_url' avec l'URL officielle ET le nom pour l'enregistrer en mémoire
    5. Si 'save_tool_url' retourne REFUSE ou ATTENTION, cherchez un outil différent
  expected_output: |
    Une description concise (2-3 phrases) EN FRANÇAIS incluant:
    - Le nom de l'outil
    - Ce qu'il fait concrètement
    - Pourquoi il est utile/innovant
    - Un lien vers le site OFFICIEL ou le repo GitHub (pas un article de blog)
    Rester bref et impactant. Contenu obligatoirement en français.
    L'URL DOIT avoir été vérifiée et sauvegardée via les outils de mémoire.
  agent: tech_tool_scout
recherche_fait_insolite_du_jour:
  description: |
    TROUVER un fait insolite, une anecdote méconnue ou un événement
    historique surprenant du monde de l'informatique et de la technologie.

    PROCÉDURE OBLIGATOIRE:
    1. Rechercher sur des sites français et anglais (Wikipédia FR/EN, blogs tech, Le Monde Informatique, Hacker News,
    Reddit TIL, histoire de l'informatique documentée.)
    2. Trouver un FAIT RÉEL intéressant et surprenant

    CATÉGORIES DISPONIBLES (rotation obligatoire):
    - bugs        : bugs et erreurs logicielles célèbres (Y2K, Ariane 5, Therac-25…)
    - easter_eggs : œufs de Pâques cachés dans des logiciels ou jeux
    - origins     : origines insolites de noms (Python, Java, Bluetooth…)
    - records     : records absurdes du monde tech (plus grand, plus vieux, plus rapide…)
    - inventions  : inventions accidentelles ou simultanées
    - pioneers    : anecdotes sur les pionniers de l'informatique
    - security    : hacks, virus, failles célèbres (Creeper, Morris Worm…)
    - other       : tout autre fait tech insolite

    RÈGLE DE ROTATION OBLIGATOIRE:
    - AVANT de chercher, utilisez 'list_used_facts' et identifiez les CATÉGORIES RECOMMANDÉES
      (les moins utilisées, affichées en bas de la liste).
    - Vous DEVEZ chercher un fait dans l'une des catégories recommandées.
    - Si les 2-3 dernières éditions ont utilisé 'bugs', cherchez dans 'records', 'pioneers',
      'inventions', 'security' ou 'other' — pas dans 'bugs' ni 'easter_eggs'.

    RÈGLES CRITIQUES:
    - UNIQUEMENT des faits RÉELS et VÉRIFIABLES
    - PAS de blagues ou histoires inventées
    - Le fait doit être surprenant ou méconnu
    - Vous pouvez chercher sur des sources anglophones et TRADUIRE en français

    Sources - Wikipédia FR/EN, lemondeinformatique.fr, blogs tech, Hacker News,
    Reddit TIL, histoire de l'informatique documentée.

    RÈGLE DE PERTINENCE ABSOLUE:
    - Le fait DOIT être lié à l'informatique ou la technologie
    - Les coïncidences historiques générales (Lincoln/Kennedy, Titanic/Titan, etc.)
      sont STRICTEMENT INTERDITES et seront REFUSÉES automatiquement par le système
    - Privilégier des sujets variés et DIFFÉRENTS de ceux déjà couverts

    PROCÉDURE ANTI-DOUBLON OBLIGATOIRE:
    1. TOUJOURS commencer par utiliser 'list_used_facts' pour voir les faits déjà présentés
       ET identifier la catégorie recommandée (affichée en bas)
    2. Chercher un fait dans la catégorie recommandée — NE PAS choisir une catégorie déjà saturée
    3. Quand vous trouvez un fait intéressant, utilisez l'outil 'check_fact'
       avec un résumé court (mots-clés) pour vérifier qu'il n'a pas déjà été présenté
    4. Si le résultat indique OUI ou REFUSE, cherchez un fait sur un THÈME COMPLÈTEMENT
       DIFFÉRENT dans une autre catégorie et répétez l'étape 3
    5. Une fois le fait final validé (non utilisé), utilisez l'outil
       'save_fact' avec le résumé, le fait complet ET la catégorie pour l'enregistrer en mémoire
    6. Si 'save_fact' retourne REFUSE, le fait n'a PAS été sauvegardé - cherchez un
       autre fait sur un thème différent dans une catégorie différente
  expected_output: |
    Un fait insolite tech EN FRANÇAIS (2-3 phrases maximum) qui surprendra
    et intéressera l'équipe. Le fait doit être RÉEL et documenté.
    Le fait DOIT avoir été vérifié et sauvegardé via les outils de mémoire.
  agent: tech_fact_finder
compilation_newsletter_wakapedia_daily_news:
  description: |
    Compiler les trois sections selon le format standardisé Wakapedia:
    - "Daily News" (actualité du jour)
    - "Daily Tool" (outil du jour)
    - "Daily Fun Fact" (info insolite du jour)

    Créer une newsletter professionnelle formatée avec le titre
    "L'agitateur matinal de savoir Tech & Fun pour la team Wakastellar".

    VALIDATION QUALITÉ AVANT COMPILATION:
    - Vérifier que chaque section a un LIEN VALIDE (URL complète commençant par http)
    - Vérifier que le contenu est factuel et non vague (pas de phrases génériques)
    - Vérifier que le français est correct et fluide
    - Si une section manque de lien ou est trop courte, reformuler pour améliorer la qualité

    IMPORTANT:
    - TOUT le contenu DOIT être en FRANÇAIS
    - Les liens doivent être cliquables et fonctionnels
    - Le style doit être professionnel mais accessible

  expected_output: |
    Une newsletter complète au format HTML avec:
    - En-tête: "L'agitateur matinal de savoir Tech & Fun pour la team Wakastellar"
    - Section "Daily News": actualité tech importante du jour EN FRANÇAIS avec lien valide
    - Section "Daily Tool": présentation d'un nouvel outil EN FRANÇAIS avec lien valide
    - Section "Daily Fun Fact": info insolite tech EN FRANÇAIS (fait réel, pas de blague)
    - CSS intégré pour un rendu professionnel

    TOUT le contenu doit être rédigé en français avec des liens fonctionnels.
  agent: newsletter_editor
  context:
  - recherche_actualite_tech_du_jour
  - decouverte_outil_du_jour
  - recherche_fait_insolite_du_jour
